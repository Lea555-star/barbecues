<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudriabotik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 600px; }
    .title {
      font-size: 2.4rem;
      font-weight: 600;
      color: #185FA5;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 2.5rem;
    }
    .cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: #fff;
      border: 1px solid #d0dce8;
      border-radius: 14px;
      padding: 1.4rem 2rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1a2a3a;
      cursor: pointer;
      min-width: 160px;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .card:hover {
      background: #eaf2fb;
      border-color: #185FA5;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(24,95,165,0.10);
    }
    .card:active { transform: scale(0.97); }
    .form-box, .result-box {
      background: #fff;
      border: 1px solid #d0dce8;
      border-radius: 14px;
      padding: 2rem;
      max-width: 400px;
      margin: 0 auto;
    }
    .badge {
      display: inline-block;
      background: #e6f1fb;
      color: #185FA5;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 8px;
      margin-bottom: 1.2rem;
    }
    .form-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a2a3a;
      margin-bottom: 1.2rem;
    }
    label { font-size: 13px; color: #5a6a7a; display: block; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.9rem;
      font-size: 1rem;
      border: 1px solid #c8d6e3;
      border-radius: 8px;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
    .btn-validate {
      width: 100%;
      padding: 0.65rem;
      font-size: 1rem;
      font-weight: 500;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-validate:hover { background: #0C447C; }
    .btn-back {
      background: none;
      border: 1px solid #c8d6e3;
      color: #5a6a7a;
      border-radius: 8px;
      padding: 0.4rem 1.2rem;
      cursor: pointer;
      font-size: 13px;
      margin-top: 1rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: background 0.15s;
    }
    .btn-back:hover { background: #f0f4f8; }
    .result-box { text-align: center; }
    .res-name { font-size: 15px; font-weight: 500; color: #1a2a3a; margin-bottom: 4px; }
    .res-label { font-size: 13px; color: #5a6a7a; margin-bottom: 0.5rem; }
    .res-num { font-size: 2.6rem; font-weight: 600; color: #185FA5; letter-spacing: 4px; margin: 1rem 0; }
    .res-hint { font-size: 13px; color: #7a8a9a; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">

    <div id="step-home">
      <div class="title">Sudriabotik</div>
      <div class="cards">
        <div class="card" onclick="goForm('Anciens membres')">Anciens membres</div>
        <div class="card" onclick="goForm('Membres actuel')">Membres actuel</div>
        <div class="card" onclick="goForm('Partenaire')">Partenaire</div>
      </div>
    </div>

    <div id="step-form" class="hidden">
      <div class="form-box">
        <div class="badge" id="badge"></div>
        <div class="form-title">Entrez votre nom pour recevoir votre numéro</div>
        <label for="nom">Votre nom</label>
        <input type="text" id="nom" placeholder="ex : Jean Dupont" />
        <button class="btn-validate" onclick="validate()">Valider</button>
        <button class="btn-back" onclick="goHome()">← Retour</button>
      </div>
    </div>

    <div id="step-result" class="hidden">
      <div class="result-box">
        <div class="badge" id="badge2"></div>
        <div class="res-name" id="res-name"></div>
        <div class="res-label">Votre numéro d'identification</div>
        <div class="res-num" id="res-num"></div>
        <div class="res-hint">Conservez ce numéro précieusement.</div>
        <button class="btn-back" onclick="goHome()">← Retour à l'accueil</button>
      </div>
    </div>

  </div>

  <script>
    let currentCat = '';

    function goForm(cat) {
      currentCat = cat;
      document.getElementById('badge').textContent = cat;
      document.getElementById('nom').value = '';
      document.getElementById('step-home').classList.add('hidden');
      document.getElementById('step-result').classList.add('hidden');
      document.getElementById('step-form').classList.remove('hidden');
      document.getElementById('nom').focus();
    }

    function validate() {
      const nom = document.getElementById('nom').value.trim();
      if (!nom) { document.getElementById('nom').focus(); return; }
      const prefix = currentCat === 'Anciens membres' ? 'AM' : currentCat === 'Membres actuel' ? 'MA' : 'PT';
      const num = prefix + '-' + Math.floor(1000 + Math.random() * 9000);
      document.getElementById('badge2').textContent = currentCat;
      document.getElementById('res-name').textContent = 'Bienvenue, ' + nom + ' !';
      document.getElementById('res-num').textContent = num;
      document.getElementById('step-form').classList.add('hidden');
      document.getElementById('step-result').classList.remove('hidden');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') validate();
    });

    function goHome() {
      document.getElementById('step-form').classList.add('hidden');
      document.getElementById('step-result').classList.add('hidden');
      document.getElementById('step-home').classList.remove('hidden');
    }
  </script>
</body>
</html>
